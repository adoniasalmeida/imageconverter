<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Logo Batch Converter Pro</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>

:root{
    --bg:#020617;
    --card:#111827;
    --border:#1e293b;
    --primary:#3b82f6;
    --primary-hover:#2563eb;
    --text:#fff;
    --muted:#94a3b8;
    --success:#22c55e;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:linear-gradient(135deg,#020617,#0f172a);
    color:var(--text);
    min-height:100vh;
}

.container{
    max-width:1450px;
    margin:auto;
    padding:30px;
}

.header{
    text-align:center;
    margin-bottom:35px;
}

.logo-title{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
    margin-bottom:10px;
}

.logo-icon{
    width:64px;
    height:64px;
    border-radius:18px;
    background:linear-gradient(135deg,#3b82f6,#2563eb);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    box-shadow:0 10px 30px rgba(59,130,246,.35);
}

.header h1{
    font-size:3rem;
}

.header p{
    color:var(--muted);
}

.layout{
    display:grid;
    grid-template-columns:400px 1fr;
    gap:25px;
}

.sidebar,
.content{
    background:rgba(17,24,39,.85);
    border:1px solid var(--border);
    border-radius:24px;
    padding:24px;
    backdrop-filter:blur(10px);
}

.section{
    margin-bottom:24px;
}

.section-title{
    margin-bottom:12px;
    font-weight:600;
    color:#e2e8f0;
}

.drop-area{
    border:2px dashed #334155;
    border-radius:18px;
    padding:40px 20px;
    text-align:center;
    cursor:pointer;
    transition:.3s;
    background:#0f172a;
}

.drop-area:hover{
    border-color:var(--primary);
}

.drop-area.active{
    border-color:var(--primary);
    background:rgba(59,130,246,.08);
}

.drop-area h2{
    margin-bottom:8px;
}

.drop-area p{
    color:var(--muted);
}

input[type=file]{
    display:none;
}

textarea,
input,
select{
    width:100%;
    background:#020617;
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px;
    color:white;
    outline:none;
    font-size:1rem;
}

textarea{
    resize:none;
    height:120px;
}

.options{
    display:grid;
    gap:14px;
}

.option label{
    display:block;
    margin-bottom:8px;
    color:#cbd5e1;
    font-size:.92rem;
}

.toggle{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#0f172a;
    border:1px solid var(--border);
    padding:14px;
    border-radius:14px;
}

.toggle input{
    width:22px;
    height:22px;
}

.buttons{
    display:grid;
    gap:12px;
    margin-top:20px;
}

button{
    border:none;
    border-radius:14px;
    padding:15px;
    cursor:pointer;
    font-size:1rem;
    font-weight:600;
    transition:.3s;
}

.primary{
    background:var(--primary);
    color:white;
}

.primary:hover{
    background:var(--primary-hover);
}

.secondary{
    background:#1e293b;
    color:white;
}

.secondary:hover{
    background:#334155;
}

button:disabled{
    opacity:.5;
    cursor:not-allowed;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    flex-wrap:wrap;
    gap:10px;
}

.status{
    color:#93c5fd;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:20px;
}

.card{
    background:#0f172a;
    border:1px solid var(--border);
    border-radius:18px;
    overflow:hidden;
    position:relative;
}

.preview{
    width:100%;
    aspect-ratio:1/1;

    background:
        linear-gradient(45deg,#1e293b 25%,transparent 25%),
        linear-gradient(-45deg,#1e293b 25%,transparent 25%),
        linear-gradient(45deg,transparent 75%,#1e293b 75%),
        linear-gradient(-45deg,transparent 75%,#1e293b 75%);

    background-size:20px 20px;
    background-position:0 0,0 10px,10px -10px,-10px 0;

    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

.preview img{
    width:100%;
    height:100%;
    object-fit:contain;
}

.info{
    padding:14px;
}

.filename{
    font-size:.85rem;
    word-break:break-word;
}

.badge{
    margin-top:10px;
    display:inline-block;
    background:rgba(34,197,94,.15);
    color:#22c55e;
    padding:6px 10px;
    border-radius:999px;
    font-size:.75rem;
}

.check-icon{
    position:absolute;
    top:10px;
    right:10px;
    width:34px;
    height:34px;
    border-radius:50%;
    background:#22c55e;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    font-weight:bold;
    box-shadow:0 5px 15px rgba(34,197,94,.4);
}

.preview-list{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(70px,1fr));
    gap:10px;
    margin-top:15px;
}

.preview-item{
    width:100%;
    aspect-ratio:1/1;
    border-radius:12px;
    overflow:hidden;
    border:1px solid #334155;
    background:#0f172a;
}

.preview-item img{
    width:100%;
    height:100%;
    object-fit:contain;
}

@media(max-width:1000px){

    .layout{
        grid-template-columns:1fr;
    }

}

</style>
</head>
<body>

<div class="container">

    <div class="header">

        <div class="logo-title">
            <div class="logo-icon">🖼️</div>
            <h1>Logo Batch Converter Pro</h1>
        </div>

        <p>
            Conversão profissional de logos PNG/SVG/WebP em lote
        </p>

    </div>

    <div class="layout">

        <div class="sidebar">

            <div class="section">

                <div class="section-title">
                    Upload Local
                </div>

                <label class="drop-area" id="dropArea">

                    <h2>📁 Arraste Imagens</h2>

                    <p>
                        ou clique para selecionar
                    </p>

                    <input
                        type="file"
                        id="fileInput"
                        multiple
                        accept="image/*,.svg"
                    >

                </label>

                <div class="preview-list" id="selectedPreview"></div>

            </div>

            <div class="section">

                <div class="section-title">
                    Links em Lote
                </div>

                <textarea
                    id="linksInput"
                    placeholder="https://site.com/logo1.png"
                ></textarea>

            </div>

            <div class="section">

                <div class="section-title">
                    Configurações
                </div>

                <div class="options">

                    <div class="option">
                        <label>Largura</label>
                        <input
                            type="number"
                            id="widthInput"
                            value="400"
                        >
                    </div>

                    <div class="option">
                        <label>Altura</label>
                        <input
                            type="number"
                            id="heightInput"
                            value="400"
                        >
                    </div>

                    <div class="option">
                        <label>Margem Interna</label>
                        <input
                            type="number"
                            id="paddingInput"
                            value="40"
                        >
                    </div>

                    <div class="toggle">
                        <span>Transparência</span>
                        <input
                            type="checkbox"
                            id="transparentBg"
                            checked
                        >
                    </div>

                    <div class="option">

                        <label>
                            Cor da Logo
                        </label>

                        <select id="logoMode">

                            <option value="original">
                                Original
                            </option>

                            <option value="white">
                                Branco
                            </option>

                            <option value="dark">
                                Cinza Escuro
                            </option>

                        </select>

                    </div>

                </div>

            </div>

            <div class="buttons">

                <button
                    class="primary"
                    id="convertBtn"
                >
                    Converter Imagens
                </button>

                <button
                    class="secondary"
                    id="downloadBtn"
                    disabled
                >
                    Baixar ZIP
                </button>

            </div>

        </div>

        <div class="content">

            <div class="topbar">

                <div id="countLabel">
                    0 convertidas
                </div>

                <div class="status" id="status">
                    Aguardando imagens...
                </div>

            </div>

            <div class="gallery" id="gallery"></div>

        </div>

    </div>

</div>

<script>

const fileInput = document.getElementById('fileInput');
const dropArea = document.getElementById('dropArea');
const gallery = document.getElementById('gallery');
const convertBtn = document.getElementById('convertBtn');
const downloadBtn = document.getElementById('downloadBtn');
const statusEl = document.getElementById('status');
const countLabel = document.getElementById('countLabel');
const widthInput = document.getElementById('widthInput');
const heightInput = document.getElementById('heightInput');
const paddingInput = document.getElementById('paddingInput');
const transparentBg = document.getElementById('transparentBg');
const logoMode = document.getElementById('logoMode');
const linksInput = document.getElementById('linksInput');
const selectedPreview = document.getElementById('selectedPreview');

let selectedFiles = [];
let convertedFiles = [];

function renderSelectedPreview(){

    selectedPreview.innerHTML = '';

    selectedFiles.forEach(file=>{

        const div = document.createElement('div');

        div.className = 'preview-item';

        const img = document.createElement('img');

        img.src = URL.createObjectURL(file);

        div.appendChild(img);

        selectedPreview.appendChild(div);

    });

}

fileInput.addEventListener('change',(e)=>{

    const files = [...e.target.files];

    selectedFiles.push(...files);

    renderSelectedPreview();

    statusEl.innerHTML =
        `${selectedFiles.length} imagens carregadas`;

    fileInput.value = '';

});

dropArea.addEventListener('click',()=>{

    fileInput.click();

});

dropArea.addEventListener('dragover',(e)=>{

    e.preventDefault();

    dropArea.classList.add('active');

});

dropArea.addEventListener('dragleave',()=>{

    dropArea.classList.remove('active');

});

dropArea.addEventListener('drop',(e)=>{

    e.preventDefault();

    dropArea.classList.remove('active');

    const files = [...e.dataTransfer.files];

    selectedFiles.push(...files);

    renderSelectedPreview();

    statusEl.innerHTML =
        `${selectedFiles.length} imagens carregadas`;

});

convertBtn.addEventListener('click',async()=>{

    gallery.innerHTML = '';

    convertedFiles = [];

    const width = parseInt(widthInput.value);
    const height = parseInt(heightInput.value);

    statusEl.innerHTML =
        'Convertendo imagens...';

    for(const file of selectedFiles){

        await processFile(file,width,height);

    }

    const links = linksInput.value
        .split('\n')
        .map(l=>l.trim())
        .filter(Boolean);

    for(const link of links){

        await processUrl(link,width,height);

    }

    countLabel.innerHTML =
        `${convertedFiles.length} convertidas`;

    statusEl.innerHTML =
        'Conversão concluída';

    if(convertedFiles.length > 0){

        downloadBtn.disabled = false;

    }

});

async function processUrl(url,width,height){

    try{

        const response = await fetch(url);

        const blob = await response.blob();

        const file = new File(
            [blob],
            getFileName(url)
        );

        await processFile(file,width,height);

    }catch(err){

        console.error(url);

    }

}

function getFileName(url){

    return url
        .split('/')
        .pop()
        .split('?')[0] || 'logo';

}

async function processFile(file,width,height){

    return new Promise((resolve)=>{

        const img = new Image();

        img.crossOrigin = 'anonymous';

        img.onload = ()=>{

            const padding =
                parseInt(paddingInput.value);

            const canvas =
                document.createElement('canvas');

            canvas.width = width;
            canvas.height = height;

            const ctx =
                canvas.getContext('2d');

            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';

            const availableWidth =
                width - (padding * 2);

            const availableHeight =
                height - (padding * 2);

            // aproxima logos pequenas até limite da margem

            const scale = Math.min(
                availableWidth / img.width,
                availableHeight / img.height
            );

            const newWidth =
                img.width * scale;

            const newHeight =
                img.height * scale;

            const x =
                (width - newWidth) / 2;

            const y =
                (height - newHeight) / 2;

            ctx.drawImage(
                img,
                x,
                y,
                newWidth,
                newHeight
            );

            // recolorir logo

            if(logoMode.value !== 'original'){

                ctx.globalCompositeOperation =
                    'source-atop';

                if(logoMode.value === 'white'){

                    ctx.fillStyle = '#ffffff';

                }

                if(logoMode.value === 'dark'){

                    ctx.fillStyle = '#2b2b2b';

                }

                ctx.fillRect(
                    0,
                    0,
                    width,
                    height
                );

                ctx.globalCompositeOperation =
                    'source-over';

            }

            canvas.toBlob((blob)=>{

                const fileName =
                    file.name.replace(
                        /\.[^/.]+$/,
                        ''
                    ) + '.png';

                convertedFiles.push({

                    name:fileName,
                    blob:blob

                });

                createPreview(
                    blob,
                    fileName
                );

                resolve();

            },'image/png');

        };

        if(file.type === 'image/svg+xml'){

            const reader = new FileReader();

            reader.onload = function(e){

                const svgBlob = new Blob(
                    [e.target.result],
                    {
                        type:'image/svg+xml'
                    }
                );

                const url =
                    URL.createObjectURL(svgBlob);

                img.src = url;

            };

            reader.readAsText(file);

        }else{

            img.src =
                URL.createObjectURL(file);

        }

    });

}

function createPreview(blob,fileName){

    const url =
        URL.createObjectURL(blob);

    const card =
        document.createElement('div');

    card.className = 'card';

    card.innerHTML = `

        <div class="preview">

            <img src="${url}">

            <div class="check-icon">✓</div>

        </div>

        <div class="info">

            <div class="filename">

                ${fileName}

            </div>

            <div class="badge">

                Convertido

            </div>

        </div>

    `;

    gallery.appendChild(card);

}

downloadBtn.addEventListener('click',async()=>{

    const zip = new JSZip();

    convertedFiles.forEach(file=>{

        zip.file(
            file.name,
            file.blob
        );

    });

    statusEl.innerHTML =
        'Criando ZIP...';

    const content =
        await zip.generateAsync({
            type:'blob'
        });

    const link =
        document.createElement('a');

    link.href =
        URL.createObjectURL(content);

    link.download =
        'logos_convertidos.zip';

    link.click();

    statusEl.innerHTML =
        'Download iniciado';

});

</script>

</body>
</html>
